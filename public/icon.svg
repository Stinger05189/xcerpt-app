<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="100%" stop-color="#0f0f11" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Outer Ring (Subtle border) -->
  <rect width="508" height="508" x="2" y="2" rx="110" fill="none" stroke="#3f3f46" stroke-width="4" />

  <!-- The Xcerpt 'X' (Context Compression Concept) -->
  <g filter="url(#shadow)">
    <!-- Left to Right Diagonal -->
    <path d="M 140 140 L 372 372" stroke="url(#accent-grad)" stroke-width="56" stroke-linecap="round" />
    <!-- Right to Left Diagonal (Intersecting) -->
    <path d="M 372 140 L 140 372" stroke="#f4f4f5" stroke-width="56" stroke-linecap="round" />
    
    <!-- Core Context Node -->
    <circle cx="256" cy="256" r="28" fill="#0f0f11" />
    <circle cx="256" cy="256" r="16" fill="url(#accent-grad)" />
  </g>
</svg>